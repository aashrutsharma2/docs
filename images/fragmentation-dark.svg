<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <rect width="800" height="520" fill="#111111" rx="14"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e1e" stroke-width="1"/>
    </pattern>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#grid)" rx="14"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5" letter-spacing="0.3">The Fragmentation Problem</text>
  <text x="400" y="58" text-anchor="middle" font-size="11.5" fill="#555">One student. Multiple disconnected systems. No coordination.</text>

  <!-- STUDENT center -->
  <circle cx="400" cy="260" r="46" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <circle cx="400" cy="260" r="42" fill="#1e1e1e"/>
  <circle cx="400" cy="245" r="11" fill="#e5e7eb"/>
  <path d="M376,278 Q376,262 400,262 Q424,262 424,278" fill="#e5e7eb"/>
  <text x="400" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#e5e7eb">STUDENT</text>

  <!-- 1. NATIONAL -->
  <rect x="60" y="72" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#f87171" stroke-width="2"/>
  <rect x="60" y="72" width="168" height="28" rx="10" fill="#991b1b"/>
  <rect x="60" y="88" width="168" height="12" fill="#991b1b"/>
  <text x="144" y="91" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">National</text>
  <text x="144" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Register separately</text>
  <text x="144" y="130" text-anchor="middle" font-size="10" fill="#9ca3af">Upload documents</text>
  <text x="144" y="145" text-anchor="middle" font-size="10" fill="#f87171" font-weight="600">Deadline: Day 5, 11:59 PM</text>

  <!-- 2. State CET -->
  <rect x="572" y="72" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  <rect x="572" y="72" width="168" height="28" rx="10" fill="#9a3412"/>
  <rect x="572" y="88" width="168" height="12" fill="#9a3412"/>
  <text x="656" y="91" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">State CET</text>
  <text x="656" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Re-enter all details</text>
  <text x="656" y="130" text-anchor="middle" font-size="10" fill="#9ca3af">Upload same documents</text>
  <text x="656" y="145" text-anchor="middle" font-size="10" fill="#fb923c" font-weight="600">Deadline: Day 7, 5:00 PM</text>

  <!-- 3. Institutional -->
  <rect x="316" y="72" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#fbbf24" stroke-width="2"/>
  <rect x="316" y="72" width="168" height="28" rx="10" fill="#92400e"/>
  <rect x="316" y="88" width="168" height="12" fill="#92400e"/>
  <text x="400" y="91" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Institutional</text>
  <text x="400" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Third registration</text>
  <text x="400" y="130" text-anchor="middle" font-size="10" fill="#9ca3af">Different format</text>
  <text x="400" y="145" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">Deadline: Varies</text>

  <!-- 4. Documents -->
  <rect x="28" y="220" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="28" y="220" width="168" height="28" rx="10" fill="#4c1d95"/>
  <rect x="28" y="236" width="168" height="12" fill="#4c1d95"/>
  <text x="112" y="239" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Documents ×3</text>
  <text x="112" y="263" text-anchor="middle" font-size="10" fill="#9ca3af">Same files uploaded</text>
  <text x="112" y="278" text-anchor="middle" font-size="10" fill="#9ca3af">to 3 different portals</text>
  <text x="112" y="293" text-anchor="middle" font-size="10" fill="#a78bfa" font-weight="600">Different size limits each</text>

  <!-- 5. Allotments -->
  <rect x="604" y="220" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#2dd4bf" stroke-width="2"/>
  <rect x="604" y="220" width="168" height="28" rx="10" fill="#134e4a"/>
  <rect x="604" y="236" width="168" height="12" fill="#134e4a"/>
  <text x="688" y="239" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">3 Allotments</text>
  <text x="688" y="263" text-anchor="middle" font-size="10" fill="#9ca3af">Check each portal</text>
  <text x="688" y="278" text-anchor="middle" font-size="10" fill="#9ca3af">Compare manually</text>
  <text x="688" y="293" text-anchor="middle" font-size="10" fill="#2dd4bf" font-weight="600">No unified view exists</text>

  <!-- 6. Withdrawal Risk -->
  <rect x="60" y="368" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#f87171" stroke-width="2"/>
  <rect x="60" y="368" width="168" height="28" rx="10" fill="#7f1d1d"/>
  <rect x="60" y="384" width="168" height="12" fill="#7f1d1d"/>
  <text x="144" y="387" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Withdrawal Risk</text>
  <text x="144" y="411" text-anchor="middle" font-size="10" fill="#9ca3af">Accept one offer</text>
  <text x="144" y="426" text-anchor="middle" font-size="10" fill="#9ca3af">Manually exit others</text>
  <text x="144" y="441" text-anchor="middle" font-size="10" fill="#f87171" font-weight="600">Miss deadline = dual seat</text>

  <!-- 7. Reporting -->
  <rect x="572" y="368" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#818cf8" stroke-width="2"/>
  <rect x="572" y="368" width="168" height="28" rx="10" fill="#312e81"/>
  <rect x="572" y="384" width="168" height="12" fill="#312e81"/>
  <text x="656" y="387" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Reporting</text>
  <text x="656" y="411" text-anchor="middle" font-size="10" fill="#9ca3af">Per-system deadlines</text>
  <text x="656" y="426" text-anchor="middle" font-size="10" fill="#9ca3af">Physical documents again</text>
  <text x="656" y="441" text-anchor="middle" font-size="10" fill="#818cf8" font-weight="600">Re-verified each time</text>

  <!-- 8. Guidance Gap -->
  <rect x="316" y="368" width="168" height="100" rx="10" fill="#1a1a1a" stroke="#6b7280" stroke-width="2"/>
  <rect x="316" y="368" width="168" height="28" rx="10" fill="#1f2937"/>
  <rect x="316" y="384" width="168" height="12" fill="#1f2937"/>
  <text x="400" y="387" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Guidance Gap</text>
  <text x="400" y="411" text-anchor="middle" font-size="10" fill="#9ca3af">No system explains</text>
  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#9ca3af">eligibility across portals</text>
  <text x="400" y="441" text-anchor="middle" font-size="10" fill="#9ca3af" font-weight="600">Student figures it out alone</text>

  <!-- CONNECTING LINES -->
  <line x1="374" y1="222" x2="230" y2="172" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="426" y1="222" x2="570" y2="172" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <line x1="400" y1="214" x2="400" y2="172" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <line x1="354" y1="250" x2="196" y2="262" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-violet)"/>
  <line x1="446" y1="250" x2="604" y2="262" stroke="#2dd4bf" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-teal)"/>
  <line x1="370" y1="294" x2="228" y2="368" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="228" cy="368" r="3" fill="#f87171"/>
  <line x1="400" y1="306" x2="400" y2="368" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="400" cy="368" r="3" fill="#6b7280"/>
  <line x1="430" y1="294" x2="572" y2="368" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="572" cy="368" r="3" fill="#818cf8"/>

  <!-- Stress lines -->
  <line x1="400" y1="210" x2="400" y2="200" stroke="#f87171" stroke-width="1.5" opacity="0.5"/>
  <line x1="425" y1="218" x2="432" y2="210" stroke="#fb923c" stroke-width="1.5" opacity="0.5"/>
  <line x1="375" y1="218" x2="368" y2="210" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom callout -->
  <rect x="160" y="486" width="480" height="24" rx="6" fill="#1f1010" stroke="#7f1d1d" stroke-width="1"/>
  <text x="400" y="502" text-anchor="middle" font-size="11" fill="#f87171" font-weight="600">Every arrow is a separate login, deadline, document set, and failure point.</text>

</svg>
