<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="300" fill="#1c1c1c" rx="12"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="13.5" font-weight="600" fill="#f0f0f0" letter-spacing="0.2">Student drop-off through the admissions process</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#666">(per 100 students)</text>

  <!-- Gridlines -->
  <line x1="230" y1="65" x2="230" y2="265" stroke="#333" stroke-width="1"/>
  <line x1="360" y1="65" x2="360" y2="265" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="490" y1="65" x2="490" y2="265" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="65" x2="620" y2="265" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="750" y1="65" x2="750" y2="265" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- X axis labels -->
  <text x="230" y="280" text-anchor="middle" font-size="10.5" fill="#555">0</text>
  <text x="360" y="280" text-anchor="middle" font-size="10.5" fill="#555">25</text>
  <text x="490" y="280" text-anchor="middle" font-size="10.5" fill="#555">50</text>
  <text x="620" y="280" text-anchor="middle" font-size="10.5" fill="#555">75</text>
  <text x="750" y="280" text-anchor="middle" font-size="10.5" fill="#555">100</text>

  <!-- Row 1: Enter process — 100 -->
  <text x="222" y="93" text-anchor="end" font-size="11.5" fill="#ccc">Enter process</text>
  <rect x="230" y="75" width="520" height="22" rx="4" fill="#5b82ff" opacity="0.9"/>
  <text x="758" y="91" text-anchor="start" font-size="11" font-weight="700" fill="#5b82ff">100</text>

  <!-- Row 2: Complete all registrations — 45 -->
  <text x="222" y="129" text-anchor="end" font-size="11.5" fill="#ccc">Complete all registrations</text>
  <rect x="230" y="111" width="234" height="22" rx="4" fill="#5b82ff" opacity="0.75"/>
  <text x="472" y="127" text-anchor="start" font-size="11" font-weight="700" fill="#5b82ff">45</text>

  <!-- Row 3: Documents submitted clean — 38 -->
  <text x="222" y="165" text-anchor="end" font-size="11.5" fill="#ccc">Documents submitted clean</text>
  <rect x="230" y="147" width="198" height="22" rx="4" fill="#5b82ff" opacity="0.6"/>
  <text x="436" y="163" text-anchor="start" font-size="11" font-weight="700" fill="#5b82ff">38</text>

  <!-- Row 4: Reach intended institution — 32 -->
  <text x="222" y="201" text-anchor="end" font-size="11.5" fill="#ccc">Reach intended institution</text>
  <rect x="230" y="183" width="166" height="22" rx="4" fill="#5b82ff" opacity="0.45"/>
  <text x="404" y="199" text-anchor="start" font-size="11" font-weight="700" fill="#5b82ff">32</text>

  <!-- Row 5: Land below eligibility — 6 -->
  <text x="222" y="237" text-anchor="end" font-size="11.5" fill="#ff6b8a">Land below eligibility</text>
  <rect x="230" y="219" width="31" height="22" rx="4" fill="#ff6b8a" opacity="0.85"/>
  <text x="269" y="235" text-anchor="start" font-size="11" font-weight="700" fill="#ff6b8a">6</text>

</svg>
