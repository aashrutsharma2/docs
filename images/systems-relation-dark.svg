<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <rect width="860" height="480" fill="#111111" rx="14"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e1e" stroke-width="1"/>
    </pattern>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#f87171"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#fb923c"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#22d3ee"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4ade80"/></marker>
    <marker id="a1b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#f87171"/></marker>
    <marker id="a2b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#fb923c"/></marker>
    <marker id="a3b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#22d3ee"/></marker>
    <marker id="a4b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4ade80"/></marker>
    <marker id="aout" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#c084fc"/></marker>
  </defs>
  <rect width="860" height="480" fill="url(#grid)" rx="14"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#f0f0f0" letter-spacing="0.3">How the Systems Relate to Each Other</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#555">No coordination layer exists between any of these systems.</text>

  <!-- STUDENT -->
  <circle cx="80" cy="240" r="44" fill="#1a1a1a" stroke="#5b82ff" stroke-width="2.5"/>
  <circle cx="80" cy="226" r="10" fill="#5b82ff"/>
  <path d="M59,252 Q59,238 80,238 Q101,238 101,252" fill="#5b82ff"/>
  <text x="80" y="272" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5b82ff">STUDENT</text>

  <!-- JoSAA -->
  <rect x="168" y="70" width="148" height="72" rx="9" fill="#1a1a1a" stroke="#f87171" stroke-width="2"/>
  <rect x="168" y="70" width="148" height="26" rx="9" fill="#991b1b"/>
  <rect x="168" y="84" width="148" height="12" fill="#991b1b"/>
  <text x="242" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">JoSAA</text>
  <text x="242" y="112" text-anchor="middle" font-size="10" fill="#9ca3af">Central Engineering</text>
  <text x="242" y="128" text-anchor="middle" font-size="10" fill="#f87171" font-weight="600">NTA managed</text>

  <!-- MCC -->
  <rect x="168" y="160" width="148" height="72" rx="9" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  <rect x="168" y="160" width="148" height="26" rx="9" fill="#9a3412"/>
  <rect x="168" y="174" width="148" height="12" fill="#9a3412"/>
  <text x="242" y="177" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MCC</text>
  <text x="242" y="202" text-anchor="middle" font-size="10" fill="#9ca3af">Central Medical</text>
  <text x="242" y="218" text-anchor="middle" font-size="10" fill="#fb923c" font-weight="600">MoHFW managed</text>

  <!-- State CET -->
  <rect x="168" y="250" width="148" height="72" rx="9" fill="#1a1a1a" stroke="#22d3ee" stroke-width="2"/>
  <rect x="168" y="250" width="148" height="26" rx="9" fill="#164e63"/>
  <rect x="168" y="264" width="148" height="12" fill="#164e63"/>
  <text x="242" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">State CET</text>
  <text x="242" y="292" text-anchor="middle" font-size="10" fill="#9ca3af">State Engineering</text>
  <text x="242" y="308" text-anchor="middle" font-size="10" fill="#22d3ee" font-weight="600">State authority</text>

  <!-- Institutional -->
  <rect x="168" y="340" width="148" height="72" rx="9" fill="#1a1a1a" stroke="#4ade80" stroke-width="2"/>
  <rect x="168" y="340" width="148" height="26" rx="9" fill="#14532d"/>
  <rect x="168" y="354" width="148" height="12" fill="#14532d"/>
  <text x="242" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Institutional</text>
  <text x="242" y="382" text-anchor="middle" font-size="10" fill="#9ca3af">College Counselling</text>
  <text x="242" y="398" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="600">Institution managed</text>

  <!-- Portal A -->
  <rect x="376" y="70" width="160" height="72" rx="9" fill="#1a1a1a" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="456" y="96" text-anchor="middle" font-size="10.5" font-weight="700" fill="#f87171">Portal A</text>
  <text x="456" y="113" text-anchor="middle" font-size="10" fill="#6b7280">Docs format: PDF ≤500KB</text>
  <text x="456" y="129" text-anchor="middle" font-size="10" fill="#f87171">Deadline: Day 5, 11:59 PM</text>

  <!-- Portal B -->
  <rect x="376" y="160" width="160" height="72" rx="9" fill="#1a1a1a" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="456" y="186" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fb923c">Portal B</text>
  <text x="456" y="203" text-anchor="middle" font-size="10" fill="#6b7280">Docs format: JPEG ≤200KB</text>
  <text x="456" y="219" text-anchor="middle" font-size="10" fill="#fb923c">Deadline: Day 6, 3:00 PM</text>

  <!-- Portal C -->
  <rect x="376" y="250" width="160" height="72" rx="9" fill="#1a1a1a" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="456" y="276" text-anchor="middle" font-size="10.5" font-weight="700" fill="#22d3ee">Portal C</text>
  <text x="456" y="293" text-anchor="middle" font-size="10" fill="#6b7280">Docs format: PDF ≤1MB</text>
  <text x="456" y="309" text-anchor="middle" font-size="10" fill="#22d3ee">Deadline: Day 7, 5:00 PM</text>

  <!-- Portal D -->
  <rect x="376" y="340" width="160" height="72" rx="9" fill="#1a1a1a" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="456" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4ade80">Portal D</text>
  <text x="456" y="383" text-anchor="middle" font-size="10" fill="#6b7280">Docs format: Varies</text>
  <text x="456" y="399" text-anchor="middle" font-size="10" fill="#4ade80">Deadline: Institution sets</text>

  <!-- No link labels -->
  <text x="368" y="152" text-anchor="middle" font-size="9" fill="#333" font-style="italic">no link</text>
  <text x="368" y="244" text-anchor="middle" font-size="9" fill="#333" font-style="italic">no link</text>
  <text x="368" y="334" text-anchor="middle" font-size="9" fill="#333" font-style="italic">no link</text>

  <!-- Outcome -->
  <rect x="596" y="158" width="210" height="150" rx="12" fill="#1a1228" stroke="#c084fc" stroke-width="2"/>
  <rect x="596" y="158" width="210" height="32" rx="12" fill="#6d28d9"/>
  <rect x="596" y="176" width="210" height="14" fill="#6d28d9"/>
  <text x="701" y="179" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">Student manages all</text>
  <text x="701" y="218" text-anchor="middle" font-size="10" fill="#c084fc">4 separate logins</text>
  <text x="701" y="234" text-anchor="middle" font-size="10" fill="#c084fc">4 document upload flows</text>
  <text x="701" y="250" text-anchor="middle" font-size="10" fill="#c084fc">4 deadline clocks running</text>
  <text x="701" y="266" text-anchor="middle" font-size="10" fill="#e879f9" font-weight="600">0 coordination between them</text>

  <!-- Student → Systems -->
  <line x1="123" y1="213" x2="168" y2="110" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <line x1="124" y1="228" x2="168" y2="200" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <line x1="124" y1="252" x2="168" y2="286" stroke="#22d3ee" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <line x1="123" y1="265" x2="168" y2="374" stroke="#4ade80" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#a4)"/>

  <!-- Systems → Portals -->
  <line x1="316" y1="106" x2="376" y2="106" stroke="#f87171" stroke-width="1.5" marker-end="url(#a1b)"/>
  <line x1="316" y1="196" x2="376" y2="196" stroke="#fb923c" stroke-width="1.5" marker-end="url(#a2b)"/>
  <line x1="316" y1="286" x2="376" y2="286" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#a3b)"/>
  <line x1="316" y1="376" x2="376" y2="376" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a4b)"/>

  <!-- Portals → Outcome -->
  <line x1="536" y1="106" x2="680" y2="178" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aout)"/>
  <line x1="536" y1="196" x2="620" y2="220" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aout)"/>
  <line x1="536" y1="286" x2="620" y2="260" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aout)"/>
  <line x1="536" y1="376" x2="680" y2="302" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aout)"/>

  <!-- Bottom callout -->
  <rect x="140" y="450" width="580" height="22" rx="6" fill="#1f1010" stroke="#7f1d1d" stroke-width="1"/>
  <text x="430" y="465" text-anchor="middle" font-size="10.5" fill="#f87171" font-weight="600">Each portal is isolated. No shared identity, no shared documents, no shared deadlines.</text>

</svg>
