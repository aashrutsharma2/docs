<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="300" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a1a1a" letter-spacing="0.2">Student drop-off through the admissions process</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#888">(per 100 students)</text>

  <!-- Chart area: labels on left, bars to right -->
  <!-- Row height = 36, starting y=72 -->
  <!-- Max bar width = 520px for value 100 -->
  <!-- x start for bars = 230 -->

  <!-- Gridlines at 0,25,50,75,100 -->
  <!-- x = 230 + (val/100)*520 -->
  <!-- 0→230, 25→360, 50→490, 75→620, 100→750 -->
  <line x1="230" y1="65" x2="230" y2="265" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="360" y1="65" x2="360" y2="265" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="490" y1="65" x2="490" y2="265" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="65" x2="620" y2="265" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="750" y1="65" x2="750" y2="265" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- X axis labels -->
  <text x="230" y="280" text-anchor="middle" font-size="10.5" fill="#aaa">0</text>
  <text x="360" y="280" text-anchor="middle" font-size="10.5" fill="#aaa">25</text>
  <text x="490" y="280" text-anchor="middle" font-size="10.5" fill="#aaa">50</text>
  <text x="620" y="280" text-anchor="middle" font-size="10.5" fill="#aaa">75</text>
  <text x="750" y="280" text-anchor="middle" font-size="10.5" fill="#aaa">100</text>

  <!-- Row 1: Enter process — 100 → 520px -->
  <text x="222" y="93" text-anchor="end" font-size="11.5" fill="#333">Enter process</text>
  <rect x="230" y="75" width="520" height="22" rx="4" fill="#3e6af1" opacity="0.9"/>
  <text x="758" y="91" text-anchor="start" font-size="11" font-weight="700" fill="#3e6af1">100</text>

  <!-- Row 2: Complete all registrations — 45 → 234px -->
  <text x="222" y="129" text-anchor="end" font-size="11.5" fill="#333">Complete all registrations</text>
  <rect x="230" y="111" width="234" height="22" rx="4" fill="#3e6af1" opacity="0.75"/>
  <text x="472" y="127" text-anchor="start" font-size="11" font-weight="700" fill="#3e6af1">45</text>

  <!-- Row 3: Documents submitted clean — 38 → 197.6px -->
  <text x="222" y="165" text-anchor="end" font-size="11.5" fill="#333">Documents submitted clean</text>
  <rect x="230" y="147" width="198" height="22" rx="4" fill="#3e6af1" opacity="0.6"/>
  <text x="436" y="163" text-anchor="start" font-size="11" font-weight="700" fill="#3e6af1">38</text>

  <!-- Row 4: Reach intended institution — 32 → 166.4px -->
  <text x="222" y="201" text-anchor="end" font-size="11.5" fill="#333">Reach intended institution</text>
  <rect x="230" y="183" width="166" height="22" rx="4" fill="#3e6af1" opacity="0.45"/>
  <text x="404" y="199" text-anchor="start" font-size="11" font-weight="700" fill="#3e6af1">32</text>

  <!-- Row 5: Land below eligibility — 6 → 31.2px -->
  <text x="222" y="237" text-anchor="end" font-size="11.5" fill="#e63059">Land below eligibility</text>
  <rect x="230" y="219" width="31" height="22" rx="4" fill="#e63059" opacity="0.85"/>
  <text x="269" y="235" text-anchor="start" font-size="11" font-weight="700" fill="#e63059">6</text>

</svg>
