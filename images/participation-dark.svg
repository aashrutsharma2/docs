<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="340" fill="#1c1c1c" rx="12"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="13.5" font-weight="600" fill="#f0f0f0" letter-spacing="0.2">Students appearing in major entrance exams</text>

  <!-- Gridlines -->
  <line x1="80" y1="275" x2="680" y2="275" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="238" x2="680" y2="238" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="202" x2="680" y2="202" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="165" x2="680" y2="165" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="128" x2="680" y2="128" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="92"  x2="680" y2="92"  stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="55"  x2="680" y2="55"  stroke="#2e2e2e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y axis labels -->
  <text x="72" y="279" text-anchor="end" font-size="11" fill="#666">0</text>
  <text x="72" y="242" text-anchor="end" font-size="11" fill="#666">5</text>
  <text x="72" y="206" text-anchor="end" font-size="11" fill="#666">10</text>
  <text x="72" y="169" text-anchor="end" font-size="11" fill="#666">15</text>
  <text x="72" y="132" text-anchor="end" font-size="11" fill="#666">20</text>
  <text x="72" y="96"  text-anchor="end" font-size="11" fill="#666">25</text>
  <text x="72" y="59"  text-anchor="end" font-size="11" fill="#666">30</text>

  <!-- Y axis title -->
  <text transform="rotate(-90)" x="-165" y="22" text-anchor="middle" font-size="11" fill="#888">Students (in lakhs)</text>

  <!-- X axis labels -->
  <text x="80"  y="295" text-anchor="middle" font-size="12" fill="#aaa">2020</text>
  <text x="230" y="295" text-anchor="middle" font-size="12" fill="#aaa">2021</text>
  <text x="380" y="295" text-anchor="middle" font-size="12" fill="#aaa">2022</text>
  <text x="530" y="295" text-anchor="middle" font-size="12" fill="#aaa">2023</text>
  <text x="680" y="295" text-anchor="middle" font-size="12" fill="#aaa">2024</text>

  <!-- X axis ticks -->
  <line x1="80"  y1="275" x2="80"  y2="280" stroke="#444" stroke-width="1"/>
  <line x1="230" y1="275" x2="230" y2="280" stroke="#444" stroke-width="1"/>
  <line x1="380" y1="275" x2="380" y2="280" stroke="#444" stroke-width="1"/>
  <line x1="530" y1="275" x2="530" y2="280" stroke="#444" stroke-width="1"/>
  <line x1="680" y1="275" x2="680" y2="280" stroke="#444" stroke-width="1"/>

  <!-- NEET area -->
  <path d="M80,158 L230,206 L380,138 L530,122 L680,104 L680,275 L80,275 Z" fill="#5b82ff" opacity="0.12"/>
  <!-- NEET line -->
  <polyline points="80,158 230,206 380,138 530,122 680,104" fill="none" stroke="#5b82ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- NEET dots -->
  <circle cx="80"  cy="158" r="4.5" fill="#5b82ff" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="230" cy="206" r="4.5" fill="#5b82ff" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="380" cy="138" r="4.5" fill="#5b82ff" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="530" cy="122" r="4.5" fill="#5b82ff" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="680" cy="104" r="4.5" fill="#5b82ff" stroke="#1c1c1c" stroke-width="2"/>

  <!-- JEE area -->
  <path d="M80,212 L230,227 L380,209 L530,193 L680,177 L680,275 L80,275 Z" fill="#2dcc8e" opacity="0.12"/>
  <!-- JEE line -->
  <polyline points="80,212 230,227 380,209 530,193 680,177" fill="none" stroke="#2dcc8e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- JEE dots -->
  <circle cx="80"  cy="212" r="4.5" fill="#2dcc8e" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="230" cy="227" r="4.5" fill="#2dcc8e" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="380" cy="209" r="4.5" fill="#2dcc8e" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="530" cy="193" r="4.5" fill="#2dcc8e" stroke="#1c1c1c" stroke-width="2"/>
  <circle cx="680" cy="177" r="4.5" fill="#2dcc8e" stroke="#1c1c1c" stroke-width="2"/>

  <!-- Data labels NEET -->
  <text x="80"  y="148" text-anchor="middle" font-size="10" fill="#5b82ff" font-weight="600">15.97</text>
  <text x="230" y="197" text-anchor="middle" font-size="10" fill="#5b82ff" font-weight="600">9.39</text>
  <text x="380" y="128" text-anchor="middle" font-size="10" fill="#5b82ff" font-weight="600">18.72</text>
  <text x="530" y="112" text-anchor="middle" font-size="10" fill="#5b82ff" font-weight="600">20.87</text>
  <text x="680" y="94"  text-anchor="middle" font-size="10" fill="#5b82ff" font-weight="600">23.33</text>

  <!-- Data labels JEE -->
  <text x="80"  y="225" text-anchor="middle" font-size="10" fill="#2dcc8e" font-weight="600">8.58</text>
  <text x="230" y="240" text-anchor="middle" font-size="10" fill="#2dcc8e" font-weight="600">6.52</text>
  <text x="380" y="222" text-anchor="middle" font-size="10" fill="#2dcc8e" font-weight="600">9.05</text>
  <text x="530" y="206" text-anchor="middle" font-size="10" fill="#2dcc8e" font-weight="600">11.16</text>
  <text x="680" y="190" text-anchor="middle" font-size="10" fill="#2dcc8e" font-weight="600">13.38</text>

  <!-- Legend -->
  <rect x="210" y="315" width="12" height="3" rx="1.5" fill="#5b82ff"/>
  <text x="227" y="321" font-size="11" fill="#bbb">NEET UG</text>
  <rect x="320" y="315" width="12" height="3" rx="1.5" fill="#2dcc8e"/>
  <text x="337" y="321" font-size="11" fill="#bbb">JEE Main</text>
  <text x="460" y="321" font-size="10" fill="#555">Source: NTA</text>

</svg>
